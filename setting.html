<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Settings</title>
        <link rel="stylesheet" href="user.css"> 
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
        <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
        <link rel="stylesheet" href="css/all.min.css">
        <link rel="stylesheet" href="css/bootstrap.min.css">

    </head>
    <body>
        <nav class="navbar navbar-light bg-primary sticky-lg-top">
            <div class="container-fluid">
                <p id="logo">LOGO</p>  
                <button class="navbar-toggler"type="button"data-bs-toggle="offcanvas"data-bs-target="#offcanvasNavbar"aria-controls="offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end"tabindex="-1"id="offcanvasNavbar"aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Profile</h5>
                        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <p>Name</p>
                        <p>Email</p>
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                                
                            <li class="nav-item">
                                <a class="nav-link" href="admin.html">Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="Adus.html">Users</a>
                            </li>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="login.html">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <main class="container mt-4">
            <section class="mb-4" id="format">
                <h2>Call and Message Templates</h2>
                <div class="form-group">
                    <label for="call-template">Call Template:</label>
                    <textarea class="form-control" id="call-template" rows="4" placeholder="Edit call template..."></textarea>
                    <button class="btn btn-success mt-2" onclick="saveTemplate('call')">Save Changes</button>
                    <button class="btn btn-info mt-2" onclick="previewTemplate('call')">Preview Call Template</button>
                </div>
                <div class="form-group">
                    <label for="message-template">Message Template:</label>
                    <textarea class="form-control" id="message-template" rows="4" placeholder="Edit message template..."></textarea>
                    <button class="btn btn-success mt-2" onclick="saveTemplate('message')">Save Changes</button>
                    <button class="btn btn-info mt-2" onclick="previewTemplate('message')">Preview Message Template</button>
                </div>
            </section>

            <section class="mb-4">
                <h2>Change Password</h2>
                <div class="form-group">
                    <label for="current-password">Current Password:</label>
                    <input type="password" class="form-control" id="current-password" placeholder="Current Password">
                </div>
                <div class="form-group">
                    <label for="new-password">New Password:</label>
                    <input type="password" class="form-control" id="new-password" placeholder="New Password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm New Password:</label>
                    <input type="password" class="form-control" id="confirm-password" placeholder="Confirm New Password">
                </div>
                <button class="btn btn-primary" onclick="changePassword()">Change Password</button>
            </section>

            <section class="mb-4">
                <h2>Uploaded Files</h2>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>File Name</th>
                            <th>Upload Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="file-list">
                        <tr>
                            <td>Loan Agreement.pdf</td>
                            <td>2023-10-01</td>
                            <td><button class="btn btn-danger btn-sm" onclick="deleteFile('Loan Agreement.pdf')">Delete</button></td>
                        </tr>
                        <tr>
                            <td>Client Data.xlsx</td>
                            <td>2023-10-02</td>
                            <td><button class="btn btn-danger btn-sm" onclick="deleteFile('Client Data.xlsx')">Delete</button></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <footer class="text-center mt-4">
            <p>Contact Support | Privacy Policy | Terms of Service</p>
        </footer>

        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
        <script src="script.js"></script>
        <script src="js/bootstrap.js"></script>
    </body>
</html>
